services:
  - type: web
    name: jjcs
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MAX_WS_MESSAGE_BYTES
        value: "65536"
