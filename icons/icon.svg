<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#080810"/>
  <!-- Stopwatch body -->
  <circle cx="50" cy="58" r="34" fill="#13132a" stroke="#ff6200" stroke-width="3"/>
  <circle cx="50" cy="58" r="26" fill="#080810"/>
  <!-- Tick marks -->
  <line x1="50" y1="29" x2="50" y2="34" stroke="#7778a0" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="58" x2="71" y2="58" stroke="#7778a0" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="87" x2="50" y2="82" stroke="#7778a0" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="58" x2="29" y2="58" stroke="#7778a0" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="50" y1="58" x2="50" y2="40" stroke="#ff6200" stroke-width="3" stroke-linecap="round"/>
  <!-- Second hand -->
  <line x1="50" y1="58" x2="64" y2="65" stroke="#00e676" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center -->
  <circle cx="50" cy="58" r="4" fill="#ff6200"/>
  <!-- Crown -->
  <rect x="44" y="17" width="12" height="8" rx="4" fill="#ff6200"/>
  <!-- Side buttons -->
  <rect x="33" y="21" width="9" height="5" rx="2.5" fill="#ff6200" transform="rotate(-30 37 23)"/>
  <rect x="58" y="21" width="9" height="5" rx="2.5" fill="#ff6200" transform="rotate(30 63 23)"/>
</svg>
